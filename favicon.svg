<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 배경 -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>
  <!-- 외부 원 -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#10b981" stroke-width="1.5"/>
  <!-- 내부 십자 가이드선 -->
  <line x1="16" y1="6" x2="16" y2="26" stroke="rgba(16,185,129,0.3)" stroke-width="0.8"/>
  <line x1="6" y1="16" x2="26" y2="16" stroke="rgba(16,185,129,0.3)" stroke-width="0.8"/>
  <!-- 컴퍼스 바늘 북 (초록) -->
  <polygon points="16,7 14.2,16 16,14.5 17.8,16" fill="#10b981"/>
  <!-- 컴퍼스 바늘 남 (흰색) -->
  <polygon points="16,25 14.2,16 16,17.5 17.8,16" fill="#ffffff" opacity="0.7"/>
  <!-- 중앙 점 -->
  <circle cx="16" cy="16" r="1.5" fill="#10b981"/>
</svg>
