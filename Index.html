<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edupath Global</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Playfair Display & Architects Daughter 폰트 유지 -->
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Caveat:wght@500;700&family=Inter:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@0,600;0,700;0,800;0,900;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#0f172a;--ink-mid:#334155;--ink-light:#64748b;
    --rule:rgba(15,23,42,.10);--rule-s:rgba(15,23,42,.42);
    --green:#10b981;--gdim:rgba(16,185,129,.07);
    --paper:#f8fafc;--white:#fff;
  }
  
  /* [Desktop Default] */
  html,body{width:100%;height:100%;overflow:hidden;background:var(--paper);
    font-family:'Inter',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
  
  .bg{position:fixed;inset:0;z-index:0;
    background-image:
      linear-gradient(rgba(148,163,184,.12) 1px,transparent 1px),
      linear-gradient(90deg,rgba(148,163,184,.12) 1px,transparent 1px),
      linear-gradient(rgba(148,163,184,.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(148,163,184,.04) 1px,transparent 1px);
    background-size:100px 100px,100px 100px,20px 20px,20px 20px}
  
  .shell{position:relative;z-index:1;display:grid;grid-template-columns:320px 1fr;
    width:100%;height:100vh;padding:22px;gap:18px;overflow:hidden}

  /* ── LEFT ── */
  .left{display:flex;flex-direction:column;gap:14px;height:100%;}
  .nav-card{background:rgba(255,255,255,.75);backdrop-filter:blur(8px);
    border:1.5px solid var(--rule-s);padding:22px}
  .logo-row{display:flex;align-items:center;gap:10px;cursor:pointer;
    margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--rule)}
  .logo-mark{width:28px;height:28px;border:2px solid var(--ink);
    display:flex;align-items:center;justify-content:center;flex-shrink:0}
  
  .logo-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:800;letter-spacing:0;color:var(--ink)}
  
  nav{display:flex;flex-direction:column}
  nav a{display:flex;align-items:center;gap:10px;font-size:10.5px;font-weight:600;
    letter-spacing:.12em;text-transform:uppercase;color:var(--ink-light);text-decoration:none;
    padding:8px 0;border-bottom:1px solid var(--rule);transition:color .2s}
  nav a:last-child{border-bottom:none}
  nav a.active{color:var(--green)}
  nav a .tick{width:16px;height:1.5px;background:currentColor;flex-shrink:0;transition:width .2s}
  nav a:hover{color:var(--green)}
  nav a:hover .tick{width:26px}
  .btn-demo{margin-top:14px;width:100%;border:1.5px solid var(--ink);background:transparent;
    padding:12px 14px;font-family:'Inter',sans-serif;font-size:10.5px;font-weight:700;
    letter-spacing:.12em;text-transform:uppercase;color:var(--ink);cursor:pointer;
    display:flex;align-items:center;justify-content:space-between;transition:background .2s,color .2s}
  .btn-demo:hover{background:var(--ink);color:var(--white)}
  
  .title-block{border:1.5px solid var(--rule-s);background:rgba(255,255,255,.88);
    backdrop-filter:blur(8px);flex:1;display:flex;flex-direction:column;overflow:hidden}
  
  .tb-row{display:flex;border-bottom:1px solid var(--rule);flex:1;}
  .tb-row:last-child{border-bottom:none}
  .tb-cell{padding:12px 14px;border-right:1px solid var(--rule);flex:1;
    display:flex;flex-direction:column;justify-content:center}
  .tb-cell:last-child{border-right:none}
  .tb-cell.gt{background:var(--gdim)}
  .tb-label{font-size:8px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;
    color:var(--ink-light);margin-bottom:4px}
  .tb-val{font-family:'Architects Daughter',cursive;font-size:13px;color:var(--ink)}
  .tb-val.g{color:var(--green);font-weight:700;}
  
  .metrics-row{display:flex;border-top:1px solid var(--rule);margin-top:auto}
  .metric{flex:1;padding:16px 14px;border-right:1px solid var(--rule);
    display:flex;flex-direction:column;justify-content:space-between;gap:8px;position:relative;overflow:hidden;
    background:linear-gradient(to bottom, transparent, rgba(16,185,129,0.02));}
  .metric:last-child{border-right:none}
  .metric-val{font-family:'Playfair Display',serif;font-size:32px;font-weight:800;font-style:italic;color:var(--ink);line-height:1;display:flex;align-items:baseline;gap:4px;}
  .metric-val span{font-family:'Inter',sans-serif;font-size:13px;font-weight:700;font-style:normal;color:var(--green);}
  .metric-lbl{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);}
  
  .m-chart-wrap{display:flex;align-items:flex-end;gap:3px;height:18px;margin-top:4px;}
  .m-bar{width:100%;background:var(--gdim);border-radius:2px 2px 0 0;transition:height 1s ease;}
  .m-bar.active{background:var(--green);}

  /* ── RIGHT ── */
  .right{border:1.5px solid var(--rule-s);background:rgba(255,255,255,.15);
    backdrop-filter:blur(3px);position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .right::before,.right::after{content:'';position:absolute;width:13px;height:13px;
    border-color:var(--ink);border-style:solid;pointer-events:none}
  .right::before{top:6px;left:6px;border-width:1.5px 0 0 1.5px}
  .right::after{bottom:6px;right:6px;border-width:0 1.5px 1.5px 0}
  
  .svg-canvas{max-width:100%;max-height:95%;height:auto;width:auto;display:block;margin:auto}

  /* ── VIEW CONTAINERS ── */
  #view-diagram, #view-architecture, #view-b2b, #view-partners, #view-cases, #view-demo {
    width: 100%; height: 100%; display: none; align-items: center; justify-content: center;
    position: absolute; inset: 0; z-index: 10; opacity: 0; transition: opacity 0.4s ease;
  }
  #view-diagram.show, #view-architecture.show, #view-b2b.show, #view-partners.show, #view-cases.show, #view-demo.show {
    display: flex; opacity: 1;
  }

  /* 📱 반응형 적용 */
  @media (max-width: 1024px) {
    html,body{height:auto;overflow-y:auto}
    .shell { display: flex; flex-direction: column; height: auto; padding: 14px; gap: 14px; overflow: visible; }
    .right { min-height: 80vh; overflow: visible; display: block; }
    .svg-canvas { width: 100%; min-width: 850px; max-height: none; height: auto; }
    #view-diagram, #view-architecture { position: relative; min-height: 100vh; }
    .title-block { height: auto; flex: none; }
    .tb-row { flex: none; min-height: 80px; }
  }

  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes show{to{opacity:1}}

  /* stroke classes */
  .sb {fill:rgba(255,255,255,.92);stroke:var(--ink);stroke-width:1.4;animation:draw 2s cubic-bezier(.4,0,.2,1) forwards;stroke-linecap:square;stroke-linejoin:miter;stroke-dasharray:2000;stroke-dashoffset:2000;}
  .sg {fill:var(--gdim);stroke:var(--green);stroke-width:1.4;animation:draw 2.2s cubic-bezier(.4,0,.2,1) forwards .1s;stroke-linecap:square;stroke-linejoin:miter;stroke-dasharray:3000;stroke-dashoffset:3000;}
  .sp {fill:none;stroke:var(--ink-mid);stroke-width:1.3;animation:draw 1s ease-out forwards .7s;stroke-linecap:square;stroke-linejoin:miter;stroke-dasharray:800;stroke-dashoffset:800;}
  .sa {fill:none;stroke:var(--green);stroke-width:1.8;animation:draw 1s ease-out forwards .85s;stroke-linecap:square;stroke-linejoin:miter;stroke-dasharray:800;stroke-dashoffset:800;}
  .sd {fill:none;stroke:var(--ink-mid);stroke-width:1;stroke-dasharray:4 4;animation:draw 1.6s linear forwards .6s;stroke-dashoffset:800;}
  .sh {fill:none;stroke:var(--green);stroke-width:1.4;animation:draw 1s ease-out forwards 1.9s;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:500;stroke-dashoffset:500;}
  .guide{fill:none;stroke:rgba(148,163,184,.28);stroke-width:.8;stroke-dasharray:3 5;animation:draw 2s linear forwards;stroke-dashoffset:1500;}
  .fx{opacity:0;animation:show .45s ease forwards}

  text.arch{font-family:'Architects Daughter',cursive;}
  text.cav {font-family:'Caveat',cursive;font-weight:700}
  text.ui  {font-family:'Inter',sans-serif;font-weight:700}
  .tech-anno { font-family: 'Inter', monospace; font-size: 7px; fill: rgba(100,116,139,0.7); letter-spacing: 0.15em; font-weight: 600; opacity: 0; animation: show 1.5s ease forwards 2.5s; }

  /* SVG Node Interactions */
  .node-group { transform-box: fill-box; transform-origin: center; transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: pointer; }
  .node-group:hover { transform: scale(1.04); }
  .node-group:hover rect.sb { stroke: var(--green) !important; filter: drop-shadow(0 8px 12px rgba(16,185,129,0.15)); }
  .node-group:hover rect.sg { stroke: #059669 !important; filter: drop-shadow(0 8px 16px rgba(16,185,129,0.25)); }
  .node-group:hover text.arch { fill: var(--green); }
  .engine-group { transform-box: fill-box; transform-origin: center; transition: transform 0.3s ease; cursor: pointer; }
  .engine-group:hover { transform: scale(1.01); }
  .engine-group:hover rect.sg { filter: drop-shadow(0 10px 20px rgba(16,185,129,0.3)); }
</style>
</head>
<body>
<div class="bg"></div>
<div class="shell">

  <!-- ══ LEFT PANEL ══ -->

        </div>

  <!-- ══ RIGHT PANEL ══ -->

<script>
  function switchView(viewId) {
    const diagView     = document.getElementById('view-diagram');
    const archView     = document.getElementById('view-architecture');
    const b2bView      = document.getElementById('view-b2b');
    const partnersView = document.getElementById('view-partners');
    const casesView    = document.getElementById('view-cases');
    const demoView     = document.getElementById('view-demo');
    const navArch      = document.getElementById('nav-arch');
    const navB2b       = document.getElementById('nav-b2b');
    const navPartners  = document.getElementById('nav-partners');
    const navCases     = document.getElementById('nav-cases');

    // Reset All
    [diagView, archView, b2bView, partnersView, casesView, demoView].forEach(v => { v.style.display = 'none'; v.classList.remove('show'); });
    [navArch, navB2b, navPartners, navCases].forEach(n => n.classList.remove('active'));

    if (viewId === 'architecture') {
      archView.style.display = 'flex';
      setTimeout(() => archView.classList.add('show'), 10);
      navArch.classList.add('active');
    } else if (viewId === 'b2b') {
      b2bView.style.display = 'flex';
      setTimeout(() => b2bView.classList.add('show'), 10);
      navB2b.classList.add('active');
    } else if (viewId === 'partners') {
      partnersView.style.display = 'flex';
      setTimeout(() => partnersView.classList.add('show'), 10);
      navPartners.classList.add('active');
    } else if (viewId === 'cases') {
      casesView.style.display = 'flex';
      setTimeout(() => casesView.classList.add('show'), 10);
      navCases.classList.add('active');
    } else if (viewId === 'demo') {
      demoView.style.display = 'flex';
      setTimeout(() => demoView.classList.add('show'), 10);
    } else {
      diagView.style.display = 'flex';
      setTimeout(() => diagView.classList.add('show'), 10);
    }
  }

  // 초기 상태 설정
  window.onload = () => switchView('diagram');
</script>
